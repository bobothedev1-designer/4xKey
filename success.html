<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>4X Bot - Key Claim</title>
    <style>
        body { background-color: #0a050d; color: #ffffff; font-family: sans-serif; text-align: center; padding-top: 15vh; }
        .box { background-color: #140b1a; border: 1px solid #ff4da6; padding: 40px; display: inline-block; border-radius: 16px; box-shadow: 0 0 20px rgba(255,77,166,0.2); }
        .key { font-family: monospace; font-size: 1.5rem; color: #ff4da6; background: rgba(0,0,0,0.4); padding: 12px; margin: 20px; border-radius: 8px; border: 1px dashed #ff4da6; }
    </style>
</head>
<body>

    <div class="box">
        <h1>🎉 Finalizing Verification</h1>
        <p id="status-text">Verifying ad-network origin headers...</p>
        <div id="key-display" class="key" style="display: none;"></div>
    </div>

    <script>
    window.addEventListener("DOMContentLoaded", async function() {
        const statusText = document.getElementById("status-text");
        const keyDisplay = document.getElementById("key-display");
        
        const apiBaseUrl = "https://optometrical-demetria-superexpressive.ngrok-free.dev";
        const currentQuery = window.location.search;

        if (!currentQuery) {
            statusText.innerText = "❌ Verification Failed: Missing redirection parameters.";
            return;
        }

        try {
            // Fetch the key while forwarding the native window.location query string data
            const response = await fetch(`${apiBaseUrl}/web-genkey${currentQuery}`, {
                method: "GET",
                headers: { "ngrok-skip-browser-warning": "69420" }
            });
            const data = await response.json();

            // Clear url params immediately so real users don't break their reloads
            window.history.replaceState({}, document.title, window.location.pathname);

            if (response.ok && data.key) {
                statusText.innerText = "Success! Here is your 4X license key:";
                keyDisplay.innerText = data.key;
                keyDisplay.style.display = "block";
            } else {
                statusText.innerText = data.error || "❌ Verification processing failed.";
            }
        } catch (error) {
            statusText.innerText = "❌ Server Connection Error.";
        }
    });
    </script>

</body>
</html>
