<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>4X Bot - Finalizing Access</title>
    <style>
        body { background-color: #0a050d; color: #ffffff; font-family: sans-serif; text-align: center; padding-top: 10vh; }
        .box { background-color: #140b1a; border: 1px solid #ff4da6; padding: 40px; display: inline-block; border-radius: 12px; }
        .key { font-family: monospace; font-size: 1.5rem; color: #ff4da6; background: rgba(0,0,0,0.3); padding: 10px; margin: 15px; border-radius: 6px; }
    </style>
</head>
<body>

    <div class="box">
        <h1>🔑 Verification Check</h1>
        <p id="status-text">Validating LootLabs secure handshake tokens...</p>
        <div id="key-display" class="key" style="display: none;"></div>
    </div>

    <script>
    window.addEventListener("DOMContentLoaded", async function() {
        const statusText = document.getElementById("status-text");
        const keyDisplay = document.getElementById("key-display");
        
        // Ensure this points to your active running tunnel link
        const apiBaseUrl = "https://optometrical-demetria-superexpressive.ngrok-free.dev";
        
        // Grab the actual URL string containing the security sequence
        const currentQuery = window.location.search;

        // Wipe address bar tokens instantly so users can't copy/paste the link to friends
        if (currentQuery) {
            window.history.replaceState({}, document.title, window.location.pathname);
        } else {
            statusText.innerText = "❌ Security Error: No verification tokens found.";
            return;
        }

        try {
            // Send the entire verification payload to your python backend to check
            const response = await fetch(`${apiBaseUrl}/web-genkey${currentQuery}`, {
                method: "GET",
                headers: { "ngrok-skip-browser-warning": "69420" }
            });
            const data = await response.json();

            if (response.ok && data.key) {
                statusText.innerText = "🎉 Access Granted! Your 6-Hour Key Is:";
                keyDisplay.innerText = data.key;
                keyDisplay.style.display = "block";
            } else {
                statusText.innerText = data.error || "❌ Anti-Bypass Triggered: Validation signature invalid.";
            }
        } catch (error) {
            statusText.innerText = "❌ Connection Error: Could not connect to your server backend.";
        }
    });
    </script>

</body>
</html>
